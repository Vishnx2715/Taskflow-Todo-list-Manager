<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Premium Todo Manager</title>
    <meta name="description" content="A premium, modern, and beautiful task management application.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Overlay -->
    <div class="login-overlay active" id="login-overlay">
        <div class="login-container">
            <div class="login-header">
                <div class="logo">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>TaskFlow</span>
                </div>
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Enter your details to access your tasks.</p>
            </div>
            
            <div class="auth-tabs" style="display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px;">
                <button class="auth-tab active" id="tab-login" style="flex: 1; background: none; border: none; padding: 8px; color: var(--accent-primary); font-weight: 600; cursor: pointer; border-bottom: 2px solid var(--accent-primary);">Login In</button>
                <button class="auth-tab" id="tab-register" style="flex: 1; background: none; border: none; padding: 8px; color: var(--text-secondary); font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent;">Create Account</button>
            </div>

            <div id="auth-error" style="color: var(--priority-high); font-size: 0.875rem; text-align: center; margin-bottom: 16px; display: none;"></div>

            <form id="auth-form">
                <div class="form-group">
                    <label for="auth-username">Username</label>
                    <input type="text" id="auth-username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="primary-btn login-btn" id="auth-submit-btn" style="width: 100%; justify-content: center; margin-top: 10px;">Sign In</button>
            </form>
        </div>
    </div>

    <div class="app-container" id="app-container" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>TaskFlow</span>
                </div>
                <div class="user-info" id="user-info">
                    <div class="user-avatar" id="user-avatar"></div>
                    <span class="user-name" id="user-name"></span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <h3>Filters</h3>
                <ul class="filter-list">
                    <li class="active" data-filter="all"><i class="fa-solid fa-inbox"></i> All Tasks</li>
                    <li data-filter="today"><i class="fa-solid fa-calendar-day"></i> Today</li>
                    <li data-filter="upcoming"><i class="fa-solid fa-calendar-alt"></i> Upcoming</li>
                    <li data-filter="important"><i class="fa-solid fa-star"></i> Important</li>
                    <li data-filter="completed"><i class="fa-solid fa-check-circle"></i> Completed</li>
                </ul>

                <h3 class="desktop-only">Categories</h3>
                <ul id="category-list">
                    <!-- Categories injected here -->
                </ul>
            </nav>

            <div class="sidebar-footer desktop-only">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fa-solid fa-sun"></i> Light Mode
                </button>
                <button id="logout-btn" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search tasks...">
                </div>
                <div class="header-actions">
                    <button id="theme-toggle-mobile" class="mobile-theme-btn mobile-only">
                        <i class="fa-solid fa-sun"></i>
                    </button>
                    <button id="add-task-btn" class="primary-btn">
                        <i class="fa-solid fa-plus"></i> New Task
                    </button>
                </div>
            </header>

            <section class="dashboard">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-list-check"></i></div>
                    <div class="stat-info">
                        <h4 id="stat-total">0</h4>
                        <p>Total Tasks</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon pending-icon"><i class="fa-solid fa-hourglass-half"></i></div>
                    <div class="stat-info">
                        <h4 id="stat-pending">0</h4>
                        <p>Pending</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon completed-icon"><i class="fa-solid fa-check-double"></i></div>
                    <div class="stat-info">
                        <h4 id="stat-completed">0</h4>
                        <p>Completed</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon rate-icon"><i class="fa-solid fa-chart-pie"></i></div>
                    <div class="stat-info">
                        <h4 id="stat-rate">0%</h4>
                        <p>Completion Rate</p>
                    </div>
                </div>
            </section>

            <section class="task-section">
                <div class="section-header">
                    <h2 id="current-view-title">All Tasks</h2>
                    <div class="sort-dropdown">
                        <select id="sort-select">
                            <option value="date-desc">Newest First</option>
                            <option value="date-asc">Oldest First</option>
                            <option value="due-date">Due Date</option>
                            <option value="priority">Priority</option>
                        </select>
                    </div>
                </div>
                <div class="task-list" id="task-list">
                    <!-- Tasks injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Create New Task</h3>
                <button class="close-modal"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="task-form">
                    <input type="hidden" id="task-id">
                    <div class="form-group">
                        <label for="task-title">Task Title</label>
                        <input type="text" id="task-title" required placeholder="What needs to be done?">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-category">Category</label>
                            <input type="text" id="task-category" list="category-options" placeholder="e.g. Work, Personal">
                            <datalist id="category-options">
                                <!-- Options injected here -->
                            </datalist>
                        </div>
                        <div class="form-group">
                            <label for="task-priority">Priority</label>
                            <select id="task-priority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-due-date">Due Date</label>
                            <input type="date" id="task-due-date">
                        </div>
                        <div class="form-group">
                            <label for="task-due-time">Time</label>
                            <input type="time" id="task-due-time">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="cancel-btn close-modal">Cancel</button>
                        <button type="submit" class="save-btn">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
